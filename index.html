<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boutique - Accueil</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            min-height: 100dvh;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            display: flex; justify-content: center; align-items: center;
            padding: 16px;
        }

        .card {
            width: 100%; max-width: 380px;
            padding: clamp(24px, 5vw, 36px) clamp(20px, 4vw, 28px);
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            text-align: center;
            animation: fadeUp .5s ease-out;
        }

        .logo {
            width: clamp(70px, 16vw, 90px);
            height: clamp(70px, 16vw, 90px);
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto clamp(16px, 3vw, 22px);
            box-shadow: 0 8px 30px rgba(67,97,238,0.35);
        }
        .logo i { font-size: clamp(1.8rem, 5vw, 2.4rem); color: #fff; }

        h1 {
            color: #fff;
            font-size: clamp(1.3rem, 5vw, 1.6rem);
            font-weight: 800;
            margin-bottom: 6px;
        }
        p.sub {
            color: rgba(255,255,255,0.5);
            font-size: clamp(.75rem, 2vw, .85rem);
            margin-bottom: clamp(24px, 5vw, 32px);
        }

        .btns {
            display: flex; flex-direction: column; gap: 14px;
        }

        .btn {
            display: flex; align-items: center; gap: 16px;
            padding: clamp(14px, 3vw, 18px) clamp(18px, 4vw, 24px);
            border-radius: 14px;
            text-decoration: none;
            transition: all .25s ease;
            position: relative; overflow: hidden;
        }
        .btn:active { transform: scale(.97); }

        .btn-shop {
            background: linear-gradient(135deg, #4361ee, #3a0ca3);
            color: #fff;
            box-shadow: 0 6px 24px rgba(67,97,238,0.3);
        }
        .btn-shop:hover { box-shadow: 0 10px 35px rgba(67,97,238,0.45); transform: translateY(-2px); }

        .btn-buy {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.12);
        }
        .btn-buy:hover { background: rgba(255,255,255,0.14); transform: translateY(-2px); }

        .btn-icon {
            width: clamp(44px, 10vw, 52px);
            height: clamp(44px, 10vw, 52px);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            flex-shrink: 0;
        }
        .btn-shop .btn-icon { background: rgba(255,255,255,0.15); }
        .btn-buy .btn-icon { background: rgba(255,255,255,0.08); }

        .btn-text { flex: 1; text-align: left; }
        .btn-text .title {
            font-size: clamp(.85rem, 2.2vw, 1rem);
            font-weight: 700; display: block;
        }
        .btn-text .desc {
            font-size: clamp(.65rem, 1.6vw, .75rem);
            opacity: .6; display: block; margin-top: 2px;
        }

        .btn-arrow {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            opacity: .4;
            transition: all .25s;
        }
        .btn:hover .btn-arrow { opacity: .8; transform: translateX(4px); }

        footer {
            margin-top: clamp(20px, 4vw, 28px);
            color: rgba(255,255,255,0.25);
            font-size: clamp(.6rem, 1.5vw, .7rem);
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-height: 500px) and (orientation: landscape) {
            .card { max-width: 96%; padding: 14px 18px; }
            .logo { width: 50px; height: 50px; margin-bottom: 10px; }
            .logo i { font-size: 1.2rem; }
            h1 { font-size: 1rem; }
            p.sub { margin-bottom: 14px; }
            .btns { flex-direction: row; gap: 10px; }
            .btn { padding: 10px 14px; }
            .btn-icon { width: 36px; height: 36px; font-size: .9rem; }
        }

        @media (prefers-reduced-motion: reduce) { .card, .btn { animation: none; transition: none; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo"><i class="fas fa-store"></i></div>
        <h1>Boutique</h1>
        <p class="sub">Bienvenue, choisissez une option</p>

        <div class="btns">
            <a href="Boutique.html" class="btn btn-shop">
                <div class="btn-icon"><i class="fas fa-store-alt"></i></div>
                <div class="btn-text">
                    <span class="title">Boutique</span>
                    <span class="desc">Voir les produits disponibles</span>
                </div>
                <span class="btn-arrow"><i class="fas fa-chevron-right"></i></span>
            </a>

            <a href="Achat.html" class="btn btn-buy">
                <div class="btn-icon"><i class="fas fa-shopping-cart"></i></div>
                <div class="btn-text">
                    <span class="title">Achat en ligne</span>
                    <span class="desc">Commander et payer en ligne</span>
                </div>
                <span class="btn-arrow"><i class="fas fa-chevron-right"></i></span>
            </a>
        </div>

        <footer>
            <p>&copy; 2025 &middot; Service client: 92 87 16 05</p>
        </footer>
    </div>
</body>
</html>
